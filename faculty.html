<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Faculty<span>Portal</span></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
  <h2>Welcome to Faculty Portal</h2>
  <p>Manage schedules, assignments, and messages.</p>

  <div class="portal-container">
    <div class="portal-card">
      <h3>Class Schedule</h3>
      <button onclick="alert('Schedule Module Coming Soon!')">View</button>
    </div>
    <div class="portal-card" style="width:300px;">
      <h3>Assignments</h3>
      <ul id="assignmentList"></ul>
    </div>
    <div class="portal-card">
      <h3>Messages</h3>
      <button onclick="alert('Messaging System Coming Soon!')">Open</button>
    </div>
  </div>
</section>

<script>
const assignments = [
  { title: "Data Structures - Assignment 1", due: "2025-07-30" },
  { title: "Operating Systems - Project", due: "2025-08-05" },
  { title: "AI - Research Paper", due: "2025-08-12" }
];

const assignmentList = document.getElementById('assignmentList');
assignments.forEach(a => {
  const li = document.createElement('li');
  li.textContent = `${a.title} (Due: ${a.due})`;
  assignmentList.appendChild(li);
});
</script>


  <footer>
    <p>&copy; 2025 Faculty Portal. All rights reserved.</p>
  </footer>
</body>
</html>
