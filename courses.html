<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Courses<span>Portal</span></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
  <h2>Available Courses</h2>
  <div class="portal-container" id="courseList"></div>
</section>

<script>
const courses = [
  { name: "B.Tech in Computer Science", duration: "4 Years", desc: "Focus on software development, AI, and more." },
  { name: "BBA", duration: "3 Years", desc: "Learn business management and entrepreneurship." },
  { name: "MBA", duration: "2 Years", desc: "Advanced business administration program." },
  { name: "M.Tech in Data Science", duration: "2 Years", desc: "Specialization in AI, ML, and data analytics." }
];

const courseList = document.getElementById('courseList');

courses.forEach(course => {
  const div = document.createElement('div');
  div.classList.add('portal-card');
  div.innerHTML = `
    <h3>${course.name}</h3>
    <p>Duration: ${course.duration}</p>
    <p>${course.desc}</p>
    <button onclick="alert('You selected ${course.name}')">View Details</button>
  `;
  courseList.appendChild(div);
});
</script>

  <footer>
    <p>&copy; 2025 Courses Portal. All rights reserved.</p>
  </footer>
</body>
</html>
