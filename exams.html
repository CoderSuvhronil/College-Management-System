<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exams & Results Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Exams<span>Portal</span></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
  <h2>Exams & Results</h2>

  <div class="portal-container">
    <div class="portal-card" style="width:400px;">
      <h3>Upcoming Exams</h3>
      <ul id="examList"></ul>
    </div>

    <div class="portal-card" style="width:500px;">
      <h3>Results</h3>
      <input type="text" id="filterRoll" placeholder="Search by Roll No." style="width: 90%; padding: 5px;">
      <table border="1" style="width:100%; border-collapse: collapse; margin-top:10px;" id="resultsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Roll</th>
            <th>Marks</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>

<script>
const exams = [
  { subject: "Mathematics", date: "2025-08-10" },
  { subject: "Computer Science", date: "2025-08-15" },
  { subject: "Physics", date: "2025-08-20" }
];

const results = [
  { name: "Rahul", roll: "CS101", marks: 85 },
  { name: "Sneha", roll: "CS102", marks: 92 },
  { name: "Amit", roll: "CS103", marks: 78 },
  { name: "Priya", roll: "CS104", marks: 88 }
];

const examList = document.getElementById('examList');
exams.forEach(exam => {
  const li = document.createElement('li');
  li.textContent = `${exam.subject} - ${exam.date}`;
  examList.appendChild(li);
});

const resultsTable = document.querySelector('#resultsTable tbody');
function displayResults(filter="") {
  resultsTable.innerHTML = "";
  results
    .filter(r => r.roll.toLowerCase().includes(filter.toLowerCase()))
    .forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.name}</td><td>${r.roll}</td><td>${r.marks}</td>`;
      resultsTable.appendChild(tr);
    });
}
displayResults();

document.getElementById('filterRoll').addEventListener('input', (e) => {
  displayResults(e.target.value);
});
</script>

  <footer>
    <p>&copy; 2025 Exams & Results Portal. All rights reserved.</p>
  </footer>
</body>
</html>
