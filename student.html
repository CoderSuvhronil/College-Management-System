<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Student<span>Portal</span></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="section">
  <h2>Welcome to Student Portal</h2>
  <p>Register students and view the list below.</p>

  <div class="portal-container">
    <div class="portal-card">
      <h3>Student Registration</h3>
      <form id="student-form">
        <input type="text" id="studentName" placeholder="Enter Name" required>
        <input type="text" id="studentRoll" placeholder="Enter Roll No." required>
        <input type="text" id="studentCourse" placeholder="Enter Course" required>
        <button type="submit">Register</button>
      </form>
    </div>
    
    <div class="portal-card" style="width: 400px;">
      <h3>Registered Students</h3>
      <table id="studentTable" border="1" style="width:100%; border-collapse: collapse;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Roll</th>
            <th>Course</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>

<script>
const studentForm = document.getElementById('student-form');
const studentTable = document.querySelector('#studentTable tbody');

studentForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = document.getElementById('studentName').value;
  const roll = document.getElementById('studentRoll').value;
  const course = document.getElementById('studentCourse').value;

  const row = document.createElement('tr');
  row.innerHTML = `<td>${name}</td><td>${roll}</td><td>${course}</td>`;
  studentTable.appendChild(row);

  studentForm.reset();
});
</script>


  <footer>
    <p>&copy; 2025 Student Portal. All rights reserved.</p>
  </footer>
</body>
</html>
